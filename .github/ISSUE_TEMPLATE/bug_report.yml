name: Bug Report
description: Report a bug in Nova Forge
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting! Please fill out the details below.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      value: |
        1. Run `python3 forge_cli.py`
        2. Type '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: dropdown
    id: model
    attributes:
      label: Model used
      options:
        - nova-lite
        - nova-pro
        - nova-premier
        - gemini-flash
        - gemini-pro
        - claude-sonnet
        - claude-haiku
        - Not applicable
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.11.x"
  - type: textarea
    id: logs
    attributes:
      label: Error logs
      description: Paste any error output or stack trace.
      render: shell
