<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Breakout — Built by Nova Forge</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="hud">
            <span id="scoreDisplay">SCORE: 0</span>
            <span id="livesDisplay">&hearts;&hearts;&hearts;</span>
        </div>
        <div id="start-screen" class="overlay">
            <h1 class="game-title">BREAKOUT</h1>
            <p class="subtitle">Built with Nova Forge + Amazon Nova Lite</p>
            <button id="start-btn" class="game-btn">&#x25b6; START GAME</button>
            <p class="controls-hint">Arrow Keys / Mouse to move paddle</p>
        </div>
        <div id="gameOver" class="overlay" style="display:none;">
            <h1 class="game-title">GAME OVER</h1>
            <p class="final-score">Score: <span id="finalScore">0</span></p>
            <button id="restartButton" class="game-btn">&#x21bb; PLAY AGAIN</button>
        </div>
        <div id="badge">&#x26a1; Powered by <a href="https://forge.herakles.dev" target="_blank">Nova Forge</a></div>
    </div>
    <script src="game.js"></script>
</body>
</html>
