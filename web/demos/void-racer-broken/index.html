<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Void Racer — Built by Nova Forge</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="game"></canvas>

<!-- HUD -->
<div id="hud" class="hidden">
  <div id="speed-label">SPD</div>
  <div id="speed-bar-container"><div id="speed-bar"></div></div>
  <div id="position-badge" class="pos-1">1st</div>
  <div id="lap-display">Lap 1/3</div>
  <div id="timer-display">00:00.00</div>
  <canvas id="minimap-container" width="100" height="100"></canvas>
</div>

<!-- Start Screen -->
<div id="start-screen" class="overlay">
  <h1>VOID RACER</h1>
  <p class="subtitle">Built with Nova Forge + Amazon Nova Premier</p>
  <button class="btn" id="start-btn">START RACE</button>
  <p class="controls-hint">Arrow Keys / WASD to drive &bull; Touch sides to steer</p>
</div>

<!-- Countdown Overlay -->
<div id="countdown-overlay" class="overlay hidden">
  <div id="countdown">3</div>
</div>

<!-- Finish Screen -->
<div id="finish-screen" class="overlay hidden">
  <h2>RACE COMPLETE</h2>
  <p class="result-line" id="result-position"></p>
  <p class="result-line" id="result-time"></p>
  <p class="result-line" id="result-speed"></p>
  <br>
  <button class="btn" id="restart-btn">RACE AGAIN</button>
</div>

<div class="badge">Powered by Nova Forge</div>

<script src="game.js"></script>
</body>
</html>
