<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Site</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="nav">
      <a href="/" class="nav__logo">MySite</a>
      <ul class="nav__links">
        <li><a href="#about">About</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero__content">
        <h1 class="hero__title">Welcome to MySite</h1>
        <p class="hero__subtitle">A clean, fast, static website. Edit this template to get started.</p>
        <a href="#about" class="btn">Learn More</a>
      </div>
    </section>

    <section id="about" class="section">
      <div class="container">
        <h2>About</h2>
        <p>Replace this content with your own. This template is minimal, responsive, and supports dark mode out of the box.</p>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 MySite. Built with Nova Forge.</p>
    </div>
  </footer>
</body>
</html>
